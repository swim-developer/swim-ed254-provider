apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.appName }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-provider.labels" . | nindent 4 }}
    component: credentials
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secret.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | quote }}
  AMQP_USERNAME: {{ .Values.secret.amqpUsername | quote }}
  AMQP_PASSWORD: {{ .Values.secret.amqpPassword | quote }}
