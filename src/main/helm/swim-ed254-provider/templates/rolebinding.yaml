apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.appName }}-secret-manager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-provider.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.appName }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: {{ .Values.appName }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
