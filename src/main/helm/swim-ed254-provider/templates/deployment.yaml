{{- include "swim-ed254-provider.validateExposure" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "swim-ed254-provider.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "swim-ed254-provider.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "swim-ed254-provider.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.appName }}
      containers:
      - name: {{ .Values.appName }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.httpPort }}
          protocol: TCP
          name: http
        - containerPort: {{ .Values.service.httpsPort }}
          protocol: TCP
          name: https
        {{- if .Values.serverCert.enabled }}
        command: ["./application"]
        args:
          - "-Dquarkus.http.host=0.0.0.0"
          - "-Djavax.net.ssl.trustStore=/certs/server/truststore.p12"
          - "-Djavax.net.ssl.trustStorePassword={{ .Values.serverCert.keystorePassword | default "changeit" }}"
          - "-Djavax.net.ssl.trustStoreType=PKCS12"
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ .Values.appName }}-config
        - secretRef:
            name: {{ .Values.appName }}-secret
        - secretRef:
            name: {{ .Values.appName }}-oidc-secret
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: server-cert
          mountPath: /certs/server
          readOnly: true
        - name: ca-cert
          mountPath: /certs/ca
          readOnly: true
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 9000
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 9000
          initialDelaySeconds: 3
          periodSeconds: 2
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: server-cert
        secret:
          secretName: {{ .Values.appName }}-server-tls
      - name: ca-cert
        secret:
          secretName: {{ .Values.appName }}-server-tls
          items:
          - key: ca.crt
            path: ca.crt
