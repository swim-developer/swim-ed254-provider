# =============================================================================
# SWIM ED-254 Provider - Test Profile
# =============================================================================
# Uses DevServices (Testcontainers) for isolated test environment
# Schedulers, messaging, and FT are disabled to prevent interference with tests
# =============================================================================

# =============================================================================
# Database
# =============================================================================

quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# =============================================================================
# OIDC (Dummy URL - tests use mock security)
# =============================================================================

quarkus.oidc.auth-server-url=http://localhost:0/realms/test
quarkus.oidc.token.issuer=any
quarkus.http.test-ssl-port=-1

# =============================================================================
# OpenTelemetry - DISABLED
# =============================================================================

quarkus.otel.sdk.disabled=true

# =============================================================================
# Schedulers / Fault Tolerance - DISABLED
# =============================================================================

quarkus.scheduler.enabled=false
quarkus.fault-tolerance.enabled=false

# =============================================================================
# SWIM Domain (Test overrides)
# =============================================================================

swim.heartbeat.enabled=false
swim.heartbeat.provider-id=test-provider
swim.heartbeat.interval=999d

swim.subscription.expiry.check-interval=1s
swim.subscription.expiry.purge-delay=10s
swim.subscription.expiry.default-ttl=30s

swim.kubernetes.namespace=test
swim.kubernetes.secret.address-configurations=test-address
swim.kubernetes.secret.security-roles=test-security

# =============================================================================
# Messaging - DISABLED
# =============================================================================

mp.messaging.incoming.ed254-events.enabled=false
mp.messaging.outgoing.ed254-subscriptions-out.enabled=false

amqp-host=localhost
artemis.broker.name=test-broker

# =============================================================================
# Logging
# =============================================================================

quarkus.log.console.enabled=true
quarkus.log.console.level=WARN
quarkus.log.file.enabled=true
quarkus.log.file.path=target/app.log
