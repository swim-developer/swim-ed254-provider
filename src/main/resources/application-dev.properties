# =============================================================================
# SWIM ED-254 Provider - Development Profile
# =============================================================================
# Uses compose.yml infrastructure (Artemis, PostgreSQL, Kafka, Keycloak)
# DevServices are DISABLED to prevent Testcontainers from starting
# =============================================================================

# =============================================================================
# Database
# =============================================================================
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.scripts.generation=none
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/swim-ed254

# =============================================================================
# Messaging
# =============================================================================
amqp-host=localhost
amqp-port=5671
amqp-username=admin
amqp-password=admin
kafka.bootstrap.servers=localhost:9092
artemis.broker.name=amq-broker

# =============================================================================
# AMQP TLS (same certs as HTTPS — Yellow Profile TLS E2E)
# =============================================================================
mp.messaging.outgoing.ed254-subscriptions-out.use-ssl=true
mp.messaging.outgoing.ed254-subscriptions-out.sni-server-name=${amqp-host}
mp.messaging.outgoing.ed254-subscriptions-out.tls-configuration-name=amqp-client

quarkus.tls.amqp-client.trust-store.pem.certs=certs/ca.crt
quarkus.tls.amqp-client.key-store.pem.0.cert=certs/client.crt
quarkus.tls.amqp-client.key-store.pem.0.key=certs/client.key

# =============================================================================
# SSL/TLS (Local certs from certs/generate.sh)
# =============================================================================
quarkus.http.ssl.certificate.files=certs/tls.crt
quarkus.http.ssl.certificate.key-files=certs/tls.key
quarkus.http.ssl.certificate.trust-store-file=certs/ca.crt
quarkus.http.ssl.certificate.trust-store-file-type=PEM
quarkus.http.ssl.client-auth=request
quarkus.http.insecure-requests=enabled

# =============================================================================
# OIDC / Keycloak (Local instance from compose.yml)
# =============================================================================
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=https://keycloak.swim.lab:8543/realms/swim
quarkus.oidc.credentials.secret=Kp4NwQsF9cHdMzYuR7jLxV3eAb8tGiXo
quarkus.tls.trust-all=true
quarkus.security.auth.enabled-in-dev-mode=true

# =============================================================================
# OpenTelemetry - DISABLED in dev (no collector running)
# =============================================================================
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# =============================================================================
# DevServices - DISABLED (use compose.yml instead)
# =============================================================================
quarkus.devservices.enabled=false

# =============================================================================
# OpenAPI
# =============================================================================
mp.openapi.servers=${OPENAPI_SERVERS:https://localhost:8443,http://localhost:8080}

# =============================================================================
# Heartbeat (Faster intervals for dev)
# =============================================================================
swim.heartbeat.interval=10s
swim.heartbeat.provider-id=ed254-provider-dev

# =============================================================================
# Subscription Expiry (Faster intervals for dev)
# =============================================================================
swim.subscription.expiry.check-interval=30s
swim.subscription.expiry.purge-delay=5m
swim.subscription.expiry.default-ttl=1h

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
quarkus.log.file.enabled=true
quarkus.log.file.path=target/app.log
