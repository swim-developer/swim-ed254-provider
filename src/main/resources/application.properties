# =============================================================================
# SWIM ED-254 Provider - Common Configuration (All Profiles)
# =============================================================================
# Profile-specific configs: application-{dev,test,prod}.properties
# =============================================================================

quarkus.application.name=swim-ed254-provider

# =============================================================================
# HTTP Server
# =============================================================================

quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.insecure-requests=enabled

internal.server.port=${INTERNAL_SERVER_PORT:9080}

quarkus.http.auth.permission.public.paths=/q/*,/swagger-ui/*,/openapi
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.ping.paths=/swim/v1/subscriptions/ping
quarkus.http.auth.permission.ping.policy=permit

quarkus.http.auth.permission.cors-preflight.paths=/swim/*
quarkus.http.auth.permission.cors-preflight.policy=permit
quarkus.http.auth.permission.cors-preflight.methods=OPTIONS

quarkus.http.auth.permission.swim-api.paths=/swim/*
quarkus.http.auth.permission.swim-api.policy=authenticated

quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.management.enabled=false
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=SWIM ED-254 Provider API
quarkus.swagger-ui.theme=flattop
quarkus.swagger-ui.doc-expansion=list

mp.openapi.servers=${OPENAPI_SERVERS}

quarkus.management.enabled=true

# =============================================================================
# Database
# =============================================================================

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update

# =============================================================================
# Messaging - AMQP Outgoing (Event Publishing to Subscribers)
# =============================================================================

mp.messaging.outgoing.ed254-subscriptions-out.connector=smallrye-amqp
mp.messaging.outgoing.ed254-subscriptions-out.address=ed254-delivery
mp.messaging.outgoing.ed254-subscriptions-out.host=${amqp-host}
mp.messaging.outgoing.ed254-subscriptions-out.port=${amqp-port}
mp.messaging.outgoing.ed254-subscriptions-out.username=${amqp-username}
mp.messaging.outgoing.ed254-subscriptions-out.password=${amqp-password}
mp.messaging.outgoing.ed254-subscriptions-out.durable=true
mp.messaging.outgoing.ed254-subscriptions-out.health-enabled=true
mp.messaging.outgoing.ed254-subscriptions-out.connect-timeout=5000
mp.messaging.outgoing.ed254-subscriptions-out.reconnect-attempts=100
mp.messaging.outgoing.ed254-subscriptions-out.reconnect-interval=10
mp.messaging.outgoing.ed254-subscriptions-out.container-id=swim-ed254-provider

# =============================================================================
# Messaging - Kafka Incoming (Event Ingress)
# =============================================================================

mp.messaging.incoming.ed254-events.connector=smallrye-kafka
mp.messaging.incoming.ed254-events.topic=${KAFKA_TOPIC:ed254-events-all-topic}
mp.messaging.incoming.ed254-events.pattern=${KAFKA_PATTERN:false}
mp.messaging.incoming.ed254-events.group.id=${KAFKA_GROUP_ID:swim-ed254-provider}
mp.messaging.incoming.ed254-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ed254-events.auto.offset.reset=earliest
mp.messaging.incoming.ed254-events.bootstrap.servers=${kafka.bootstrap.servers}
mp.messaging.incoming.ed254-events.tracing-enabled=true
mp.messaging.incoming.ed254-events.max.poll.records=${KAFKA_MAX_POLL_RECORDS:50}
mp.messaging.incoming.ed254-events.pause-if-no-requests=true
mp.messaging.incoming.ed254-events.requests=${KAFKA_REQUESTS:100}
mp.messaging.incoming.ed254-events.commit-strategy=throttled
mp.messaging.incoming.ed254-events.throttled.unprocessed-record-max-age.ms=60000
mp.messaging.incoming.ed254-events.failure-strategy=ignore
mp.messaging.incoming.ed254-events.reconnect.backoff.ms=1000
mp.messaging.incoming.ed254-events.reconnect.backoff.max.ms=30000
mp.messaging.incoming.ed254-events.retry.backoff.ms=500
mp.messaging.incoming.ed254-events.session.timeout.ms=45000
mp.messaging.incoming.ed254-events.request.timeout.ms=30000

# =============================================================================
# Messaging - Kafka Outgoing (Outbox + DLQ)
# =============================================================================

mp.messaging.outgoing.ed254-outbox.connector=smallrye-kafka
mp.messaging.outgoing.ed254-outbox.topic=ed254-outbox
mp.messaging.outgoing.ed254-outbox.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.ed254-dlq.connector=smallrye-kafka
mp.messaging.outgoing.ed254-dlq.topic=ed254-dlq
mp.messaging.outgoing.ed254-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# =============================================================================
# SWIM Outbox Recovery Configuration
# =============================================================================

swim.outbox.recovery.interval=30s
swim.outbox.recovery.batch-size=100
swim.outbox.recovery.max-retries=5

# =============================================================================
# SWIM Failed Delivery Recovery Configuration
# =============================================================================

swim.failed-delivery.recovery.interval=30s
swim.failed-delivery.recovery.batch-size=50
swim.failed-delivery.recovery.max-retries=5

# =============================================================================
# SWIM Domain Configuration
# =============================================================================

swim.provider.outbox.event-address=ed254.outbox.deliver
swim.provider.metric-prefix=ed254

swim.topics=${SWIM_TOPICS:ArrivalSequenceService}
swim.amq.role.suffix=-swim-ed254-v1-amq-role

swim.kubernetes.namespace=${KUBERNETES_NAMESPACE:swim-demo}
swim.kubernetes.secret.address-configurations=${K8S_SECRET_ADDRESS:address-swim-configurations-bp}
swim.kubernetes.secret.security-roles=${K8S_SECRET_SECURITY:security-swim-roles-bp}

# =============================================================================
# Security / OIDC
# =============================================================================

quarkus.oidc.enabled=${OIDC_ENABLED:true}
quarkus.oidc.application-type=service
quarkus.oidc.client-id=${OIDC_CLIENT_ID:swim-ed254-provider}
quarkus.oidc.token.issuer=any
quarkus.kubernetes-client.trust-certs=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H

# =============================================================================
# SWIM Per-Subscription Heartbeat Configuration (Framework-level)
# =============================================================================

swim.heartbeat.enabled=true
swim.heartbeat.interval=15s
swim.heartbeat.provider-id=${HOSTNAME:ed254-provider-${RANDOM_UUID}}

# =============================================================================
# SWIM Subscription TTL/Expiry Configuration (Framework-level)
# =============================================================================

swim.subscription.expiry.check-interval=60s
swim.subscription.expiry.purge-interval=5m
swim.subscription.expiry.purge-delay=1h
swim.subscription.expiry.default-ttl=24h
swim.subscription.expiry.max-ttl=168h

# =============================================================================
# Observability (Logging, OTel, Metrics)
# =============================================================================

quarkus.log.level=INFO
quarkus.log.category."com.github.swim_developer".level=${LOG_LEVEL:INFO}
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%c] (%t) %s%e%n
quarkus.log.console.async.enabled=true
quarkus.log.console.async.queue-length=10000
quarkus.log.console.async.overflow=DISCARD

quarkus.otel.enabled=${OTEL_ENABLED:true}
quarkus.otel.sdk.disabled=${OTEL_SDK_DISABLED:false}
quarkus.otel.exporter.otlp.endpoint=${OTEL_ENDPOINT:http://tempo-simplest-distributor.tempostack.svc.cluster.local:4317}
quarkus.otel.exporter.otlp.headers=${OTEL_HEADERS:}
quarkus.otel.resource.attributes=service.name=swim-ed254-provider,service.version=1.0.0,k8s.namespace.name=${POD_NAMESPACE:unknown}

quarkus.micrometer.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.enabled=${PROMETHEUS_ENABLED:true}
quarkus.micrometer.export.prometheus.path=/q/metrics

# =============================================================================
# Fault Tolerance
# =============================================================================

quarkus.fault-tolerance.enabled=true

# =============================================================================
# SSL/TLS
# =============================================================================

quarkus.ssl.native=true

# =============================================================================
# Native Image
# =============================================================================
quarkus.index-dependency.fixm-ed254-model.group-id=com.github.swim-developer
quarkus.index-dependency.fixm-ed254-model.artifact-id=fixm-ed254-model
quarkus.native.resources.includes=schemas/**,com/sun/org/apache/xerces/internal/impl/msg/**,com/sun/org/apache/xerces/internal/impl/xpath/regex/**
quarkus.native.additional-build-args=-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLSchemaMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.XMLMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.msg.SAXMessages,-H:IncludeResourceBundles=com.sun.org.apache.xerces.internal.impl.xpath.regex.message
