# =============================================================================
# SWIM ED-254 Provider - Production Profile
# =============================================================================
# Uses external PostgreSQL, Artemis, Kafka, and Keycloak in OpenShift
# All secrets are externalized via environment variables
# =============================================================================

# =============================================================================
# Database
# =============================================================================

quarkus.datasource.username=${POSTGRES_USER:swim-provider}
quarkus.datasource.password=${POSTGRES_PASSWORD:swim-provider}
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:provider-postgres.swim-demo.svc.cluster.local}:${POSTGRES_PORT:5432}/${POSTGRES_DB:swim-ed254}
quarkus.datasource.jdbc.max-size=200
quarkus.datasource.jdbc.min-size=20
quarkus.datasource.jdbc.acquisition-timeout=10s
quarkus.datasource.jdbc.idle-removal-interval=2m
quarkus.datasource.jdbc.leak-detection-interval=10s
quarkus.datasource.jdbc.validation-query-sql=SELECT 1
quarkus.datasource.jdbc.background-validation-interval=30s
quarkus.datasource.jdbc.max-lifetime=30m
quarkus.datasource.jdbc.flush-on-close=true

# =============================================================================
# OIDC / Keycloak
# =============================================================================
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:https://rhbk.apps.ocp4.masales.cloud/realms/swim}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:ed254-provider-secret}

# =============================================================================
# SSL/TLS (Certificates from Kubernetes Secrets)
# =============================================================================
quarkus.http.ssl.certificate.files=${QUARKUS_HTTP_SSL_CERTIFICATE_FILES:/certs/server/tls.crt}
quarkus.http.ssl.certificate.key-files=${QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES:/certs/server/tls.key}
quarkus.http.ssl.certificate.trust-store-file=${QUARKUS_HTTP_SSL_CERTIFICATE_TRUST_STORE_FILE:/certs/ca/ca.crt}
quarkus.http.ssl.certificate.trust-store-file-type=PEM
quarkus.http.ssl.client-auth=request

# =============================================================================
# Messaging
# =============================================================================
amqp-host=${AMQP_HOST:provider-artemis.swim-demo.svc.cluster.local}
amqp-port=${AMQP_PORT:5671}
amqp-username=${AMQP_USERNAME:admin}
amqp-password=${AMQP_PASSWORD:admin}
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka.swim-demo.svc.cluster.local:9092}

# =============================================================================
# Artemis
# =============================================================================
artemis.broker.url=tcp://${AMQP_HOST:provider-artemis.swim-demo.svc.cluster.local}:61616

# =============================================================================
# AMQP Broker - Production SSL (same certs as HTTPS — Yellow Profile TLS E2E)
# =============================================================================
mp.messaging.outgoing.ed254-subscriptions-out.use-ssl=true
mp.messaging.outgoing.ed254-subscriptions-out.sni-server-name=${amqp-host}
mp.messaging.outgoing.ed254-subscriptions-out.tls-configuration-name=amqp-client

quarkus.tls.amqp-client.trust-store.pem.certs=${QUARKUS_HTTP_SSL_CERTIFICATE_TRUST_STORE_FILE:/certs/ca/ca.crt}
quarkus.tls.amqp-client.key-store.pem.0.cert=${QUARKUS_HTTP_SSL_CERTIFICATE_FILES:/certs/server/tls.crt}
quarkus.tls.amqp-client.key-store.pem.0.key=${QUARKUS_HTTP_SSL_CERTIFICATE_KEY_FILES:/certs/server/tls.key}

# =============================================================================
# Leader Election (Deployment — Kubernetes Lease)
# =============================================================================
swim.leader-election.mode=lease
swim.leader-election.lease-name=swim-ed254-provider-leader
swim.leader-election.lease-duration-seconds=15
swim.leader-election.renew-deadline-seconds=10
swim.leader-election.retry-period-seconds=2

# =============================================================================
# OpenTelemetry
# =============================================================================
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_ENDPOINT:http://tempo-simplest-distributor.tempostack.svc.cluster.local:4317}

# =============================================================================
# Logging
# =============================================================================
quarkus.log.category."com.github.swim_developer".level=INFO
